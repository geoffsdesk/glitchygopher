apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glitchygopher-data
  labels:
    app: glitchygopher
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glitchygopher
  labels:
    app: glitchygopher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glitchygopher
  template:
    metadata:
      labels:
        app: glitchygopher
      annotations:
        cloud.google.com/gke-sandbox: "gvisor"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: glitchygopher
        image: gcr.io/glitchygopher/glitchygopher:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: health
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
            ephemeral-storage: "1Gi"
          limits:
            cpu: "500m"
            memory: "1Gi"
            ephemeral-storage: "2Gi"
        volumeMounts:
        - name: trade-data
          mountPath: /app/data
        env:
        - name: LOG_FORMAT
          value: "json"
        - name: TRADE_HISTORY_PATH
          value: "/app/data/trade_history.json"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: glitchygopher-secrets
              key: GEMINI_API_KEY
        - name: ALPHA_VANTAGE_KEY
          valueFrom:
            secretKeyRef:
              name: glitchygopher-secrets
              key: ALPHA_VANTAGE_KEY
        - name: MOLTBOOK_API_KEY
          valueFrom:
            secretKeyRef:
              name: glitchygopher-secrets
              key: MOLTBOOK_API_KEY
        # Optional: OANDA paper trading
        - name: OANDA_API_KEY
          valueFrom:
            secretKeyRef:
              name: glitchygopher-secrets
              key: OANDA_API_KEY
              optional: true
        - name: OANDA_ACCOUNT_ID
          valueFrom:
            secretKeyRef:
              name: glitchygopher-secrets
              key: OANDA_ACCOUNT_ID
              optional: true
        - name: OANDA_ENVIRONMENT
          value: "practice"
      volumes:
      - name: trade-data
        persistentVolumeClaim:
          claimName: glitchygopher-data
